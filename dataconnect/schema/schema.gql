type User @table {
  username: String!
  email: String!
  createdAt: Timestamp!
  displayName: String
  bio: String
  profilePictureUrl: String
}

type Snippet @table {
  title: String!
  codeContent: String!
  language: String!
  isPublic: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  description: String
  author: User
}

type Comment @table {
  content: String!
  createdAt: Timestamp!
  author: User
  snippet: Snippet
}

type Tag @table {
  name: String!
}

type SnippetTag @table(key: ["snippet", "tag"]) {
  snippet: Snippet!
  tag: Tag!
}